<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballagási meghívó</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3ece7;
      font-family: "Cormorant Garamond", serif;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 603px;
      min-height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.92), rgba(247,241,233,0.96)),
        linear-gradient(180deg, #f8f3ec 0%, #f7f2eb 100%);
      color: #161211;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    .paper {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(120,100,80,0.12) 0.6px, transparent 0.6px),
        radial-gradient(rgba(120,100,80,0.08) 0.6px, transparent 0.6px);
      background-size: 12px 12px, 18px 18px;
      background-position: 0 0, 6px 6px;
      mix-blend-mode: multiply;
    }

    .curve-top {
      position: absolute;
      top: -110px;
      left: -120px;
      width: 330px;
      height: 240px;
      background: #d8c2c5;
      border-bottom-right-radius: 260px;
      opacity: 0.95;
    }

    .curve-bottom {
      position: absolute;
      left: -90px;
      bottom: -90px;
      width: 310px;
      height: 220px;
      background: #d8c2c5;
      border-top-right-radius: 260px;
      opacity: 0.95;
    }

    .gold-line-top,
    .gold-line-bottom {
      position: absolute;
      border: 4px solid #d2ac4f;
      border-color: #d2ac4f transparent transparent transparent;
      border-radius: 50%;
      pointer-events: none;
    }

    .gold-line-top {
      top: -70px;
      left: -70px;
      width: 270px;
      height: 190px;
      transform: rotate(-18deg);
    }

    .gold-line-bottom {
      left: -65px;
      bottom: 78px;
      width: 250px;
      height: 230px;
      transform: rotate(25deg);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 92px 42px 70px;
    }

    h1 {
      font-size: 4.2rem;
      line-height: 1.05;
      font-weight: 600;
      margin-bottom: 96px;
    }

    .name {
      font-size: 2.15rem;
      line-height: 1.2;
      margin-bottom: 58px;
      font-weight: 500;
    }

    .message {
      max-width: 470px;
      margin: 0 auto 64px;
      font-size: 2rem;
      line-height: 1.27;
      font-weight: 600;
    }

    .date-box {
      display: inline-block;
      background: rgba(214, 187, 194, 0.55);
      padding: 8px 14px;
      margin-bottom: 16px;
    }

    .date-box p {
      font-size: 1.55rem;
      line-height: 1.1;
      font-weight: 700;
    }

    .start {
      font-size: 1.15rem;
      line-height: 1.15;
      margin-bottom: 88px;
      font-weight: 600;
    }

    .signature {
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 500;
    }

    .floral {
      position: absolute;
      z-index: 1;
      opacity: 0.45;
      color: #a48f94;
      pointer-events: none;
    }

    .floral svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .floral.top-right {
      top: 0;
      right: 0;
      width: 185px;
      height: 210px;
    }

    .floral.bottom-right {
      right: 0;
      bottom: 0;
      width: 180px;
      height: 215px;
    }

    .floral.bottom-left {
      left: 0;
      bottom: 120px;
      width: 145px;
      height: 145px;
      opacity: 0.52;
    }

    @media (max-width: 640px) {
      .card {
        min-height: 100vh;
      }

      .content {
        padding: 72px 28px 54px;
      }

      h1 {
        font-size: 3.35rem;
        margin-bottom: 72px;
      }

      .name {
        font-size: 1.8rem;
        margin-bottom: 46px;
      }

      .message {
        font-size: 1.72rem;
        margin-bottom: 50px;
      }

      .date-box p {
        font-size: 1.25rem;
      }

      .start {
        font-size: 1rem;
        margin-bottom: 72px;
      }

      .signature {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

    <div class="gold-line-top"></div>

    <div class="content">
      <h1>Ballagási meghívó</h1>

      <div class="name">Drága Rebeka, szerelmem!</div>

      <div class="message">
        Szeretettel meghívlak a ballagásomra, és nagyon boldoggá tennél,
        ha ezen a fontos napon mellettem lennél.
      </div>

      <div class="date-box">
        <p>Időpont: 2026. április 30. 16:00</p>
      </div>

      <div class="start">Kezdés: délután 4 óra</div>

      <div class="signature">Szeretettel várlak: Márkó</div>
    </div>
  </div>
</body>
</html>
